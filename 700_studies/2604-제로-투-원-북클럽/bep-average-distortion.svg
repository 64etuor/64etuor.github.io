<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" width="680" height="360">
  <defs>
    <style>
      .axis     { stroke: #1f2937; stroke-width: 1.8; fill: none; }
      .cost     { stroke: #2c5f7f; stroke-width: 2.2; fill: none; stroke-linejoin: miter; }
      .rev      { stroke: #c0392b; stroke-width: 2.2; fill: none; stroke-linejoin: miter; }
      .ref      { stroke-dasharray: 4 4; stroke-width: 1.2; fill: none; }
      .bep-dot  { fill: #c0392b; stroke: #1f2937; stroke-width: 1.2; }
      .bep-band { fill: #fde68a; opacity: 0.5; }
      .title    { font: 700 17px 'Inter','Segoe UI',sans-serif; fill: #1f2937; text-anchor: middle; }
      .sub      { font: 500 12px 'Inter','Segoe UI',sans-serif; fill: #555;    text-anchor: middle; }
      .note     { font: 700 12px 'Inter','Segoe UI',sans-serif; fill: #c0392b; text-anchor: middle; }
      .lbl      { font: 600 11px 'Inter','Segoe UI',sans-serif; fill: #1f2937; }
      .axis-lbl { font: 500 11px 'Inter','Segoe UI',sans-serif; fill: #666;    text-anchor: middle; }
      .sep      { stroke: #d1d5db; stroke-width: 1; fill: none; stroke-dasharray: 4 4; }
    </style>
  </defs>
  <rect width="680" height="360" fill="#ffffff"/>

  <line class="sep" x1="340" y1="30" x2="340" y2="310"/>

  <!-- LEFT: 평균선 (smoothed straight) -->
  <g>
    <line class="axis" x1="60"  y1="250" x2="320" y2="250"/>
    <line class="axis" x1="60"  y1="60"  x2="60"  y2="250"/>

    <!-- Total cost (linear) -->
    <line class="cost" x1="70" y1="193" x2="310" y2="107"/>
    <!-- Total revenue (linear, starts near origin) -->
    <line class="rev"  x1="70" y1="240" x2="310" y2="79"/>

    <!-- Single clean BEP -->
    <circle class="bep-dot" cx="220" cy="140" r="5"/>
    <text class="note" x="220" y="132">BEP</text>

    <text class="lbl" x="282" y="100" fill="#2c5f7f">총비용</text>
    <text class="lbl" x="282" y="72"  fill="#c0392b">총매출</text>

    <text class="axis-lbl" x="190" y="268">시간 / 매출량</text>
    <text class="axis-lbl" transform="rotate(-90 40 155)" x="40" y="155">누적 금액</text>

    <text class="title" x="190" y="295">평균선</text>
    <text class="sub"   x="190" y="313">BEP가 한 점으로 또렷하다</text>
  </g>

  <!-- RIGHT: 현실 (monotonic, but stair-step cost & uneven revenue) -->
  <g>
    <line class="axis" x1="380" y1="250" x2="650" y2="250"/>
    <line class="axis" x1="380" y1="60"  x2="380" y2="250"/>

    <!-- BEP uncertainty band -->
    <rect class="bep-band" x="569" y="60" width="41" height="190"/>
    <text class="note" x="589" y="55">BEP 구간</text>

    <!-- Faint smoothed reference -->
    <line class="ref cost" x1="390" y1="193" x2="640" y2="107" opacity="0.35"/>
    <line class="ref rev"  x1="390" y1="240" x2="640" y2="79"  opacity="0.35"/>

    <!-- Total cost: gentle slope + vertical step jumps (capex) -->
    <path class="cost" d="
      M 390,193
      L 444,187
      L 444,170
      L 525,155
      L 525,136
      L 606,121
      L 606,111
      L 650,107
    "/>

    <!-- Total revenue: monotonic but accelerating, with plateau -->
    <polyline class="rev" points="
      390,240 471,227 525,183 579,126 606,121 650,79
    "/>

    <!-- BEP crossings (two) -->
    <circle class="bep-dot" cx="579" cy="126" r="4"/>
    <circle class="bep-dot" cx="610" cy="110" r="4"/>

    <text class="lbl" x="615" y="100" fill="#2c5f7f">총비용</text>
    <text class="lbl" x="615" y="72"  fill="#c0392b">총매출</text>

    <text class="axis-lbl" x="515" y="268">시간 / 매출량</text>
    <text class="axis-lbl" transform="rotate(-90 360 155)" x="360" y="155">누적 금액</text>

    <text class="title" x="515" y="295">현실</text>
    <text class="sub"   x="515" y="313">매출이 추월해도 자본 지출이 비용을 다시 점프시킨다</text>
  </g>
</svg>
