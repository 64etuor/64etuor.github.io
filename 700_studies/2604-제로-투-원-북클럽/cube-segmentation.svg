<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" width="560" height="380">
  <defs>
    <style>
      .top-face { fill: #fff1b8; }
      .front-face { fill: #cfe6f3; }
      .right-face { fill: #f3cfcf; }
      .edge { stroke: #1f2937; stroke-width: 2; fill: none; stroke-linejoin: round; }
      .grid { stroke: #1f2937; stroke-width: 0.9; fill: none; stroke-opacity: 0.55; }
      .target { fill: #e67e22; fill-opacity: 0.95; stroke: #7a3e00; stroke-width: 2; }
      .label { font: 600 12px 'Inter', 'Segoe UI', sans-serif; fill: #222; }
      .axislabel { font: 700 13px 'Inter', 'Segoe UI', sans-serif; fill: #c0392b; }
      .target-label { font: 700 11px sans-serif; fill: #ffffff; }
    </style>
  </defs>
  <rect width="560" height="380" fill="#ffffff"/>
  <polygon class="top-face"   points="160,140 310,140 440,65 290,65"/>
  <polygon class="front-face" points="160,140 310,140 310,290 160,290"/>
  <polygon class="right-face" points="310,140 440,65 440,215 310,290"/>
  <line class="grid" x1="210" y1="140" x2="339" y2="65"/>
  <line class="grid" x1="260" y1="140" x2="389" y2="65"/>
  <line class="grid" x1="203" y1="115" x2="353" y2="115"/>
  <line class="grid" x1="246" y1="90"  x2="396" y2="90"/>
  <line class="grid" x1="210" y1="140" x2="210" y2="290"/>
  <line class="grid" x1="260" y1="140" x2="260" y2="290"/>
  <line class="grid" x1="160" y1="190" x2="310" y2="190"/>
  <line class="grid" x1="160" y1="240" x2="310" y2="240"/>
  <line class="grid" x1="353" y1="115" x2="353" y2="265"/>
  <line class="grid" x1="396" y1="90"  x2="396" y2="240"/>
  <line class="grid" x1="310" y1="190" x2="440" y2="115"/>
  <line class="grid" x1="310" y1="240" x2="440" y2="165"/>
  <polygon class="target" points="210,190 260,190 260,240 210,240"/>
  <text class="target-label" x="235" y="222" text-anchor="middle">Target</text>
  <polyline class="edge" points="160,140 310,140 440,65 290,65 160,140"/>
  <polyline class="edge" points="160,140 160,290 310,290 310,140"/>
  <polyline class="edge" points="310,290 440,215 440,65"/>
  <line class="edge" x1="310" y1="140" x2="310" y2="290"/>
  <text class="label" x="185" y="310" text-anchor="middle">Past</text>
  <text class="label" x="235" y="310" text-anchor="middle">Present</text>
  <text class="label" x="285" y="310" text-anchor="middle">Future</text>
  <text class="axislabel" x="235" y="332" text-anchor="middle">X — Time</text>
  <text class="label" x="153" y="169" text-anchor="end">Personal</text>
  <text class="label" x="153" y="219" text-anchor="end">Professional</text>
  <text class="label" x="153" y="269" text-anchor="end">Organization</text>
  <text class="axislabel" x="60" y="215" text-anchor="middle" transform="rotate(-90 60 215)">Y — Subject</text>
  <text class="label" x="326" y="132" text-anchor="middle">Theme 1</text>
  <text class="label" x="369" y="107" text-anchor="middle">Theme 2</text>
  <text class="label" x="412" y="82"  text-anchor="middle">Theme 3</text>
  <text class="axislabel" x="430" y="38" text-anchor="middle" transform="rotate(-30 430 38)">Z — Theme (1→2→3)</text>
