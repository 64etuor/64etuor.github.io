<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 500" width="560" height="500">
  <defs>
    <style>
      .circle-a  { fill: #cfe6f3; fill-opacity: 0.55; stroke: #1f2937; stroke-width: 2; }
      .circle-b  { fill: #fff1b8; fill-opacity: 0.55; stroke: #1f2937; stroke-width: 2; }
      .circle-c  { fill: #f3cfcf; fill-opacity: 0.55; stroke: #1f2937; stroke-width: 2; }
      .secret-region { fill: #1f2937; fill-opacity: 0.88; stroke: none; }
      .label-main    { font: 700 17px 'Inter', 'Segoe UI', sans-serif; fill: #1f2937; text-anchor: middle; }
      .label-sub     { font: 500 12px 'Inter', 'Segoe UI', sans-serif; fill: #444;    text-anchor: middle; }
      .label-secret  { font: 800 15px 'Inter', 'Segoe UI', sans-serif; fill: #ffffff; text-anchor: middle; letter-spacing: 2px; }
    </style>
  </defs>
  <rect width="560" height="500" fill="#ffffff"/>

  <!-- Three overlapping circles -->
  <circle class="circle-a" cx="215" cy="210" r="130"/>
  <circle class="circle-b" cx="345" cy="210" r="130"/>
  <circle class="circle-c" cx="280" cy="320" r="130"/>

  <!-- True 3-way intersection region (Reuleaux-triangle shape), bounded by 3 circular arcs -->
  <path class="secret-region"
        d="M 215.1 207.4
           A 130 130 0 0 1 344.9 207.4
           A 130 130 0 0 1 280 322.6
           A 130 130 0 0 1 215.1 207.4 Z"/>

  <!-- A exclusive lobe (upper-left): Important -->
  <text class="label-main" x="150" y="175">Important</text>
  <text class="label-sub"  x="150" y="193">중요한 진실 (Truth)</text>

  <!-- B exclusive lobe (upper-right): Unknown -->
  <text class="label-main" x="410" y="175">Unknown</text>
  <text class="label-sub"  x="410" y="193">소수만 아는 (Very Few)</text>

  <!-- C exclusive lobe (bottom): Hard but Doable -->
  <text class="label-main" x="280" y="410">Hard but Doable</text>
  <text class="label-sub"  x="280" y="428">어렵지만 할 수 있는</text>

  <!-- SECRET text on top of filled intersection -->
  <text class="label-secret" x="280" y="252">SECRET</text>
</svg>
