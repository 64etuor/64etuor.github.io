<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320">
  <defs>
    <style>
      .circle-a { fill: #cfe6f3; fill-opacity: 0.7; stroke: #1f2937; stroke-width: 2; }
      .circle-b { fill: #a6cfe5; fill-opacity: 0.7; stroke: #1f2937; stroke-width: 2; }
      .triangle-shape { fill: #fff1b8; stroke: #1f2937; stroke-width: 2; }
      .square-shape { fill: #f3cfcf; stroke: #1f2937; stroke-width: 2; }
      .divider { stroke: #1f2937; stroke-width: 1.5; fill: none; }
      .shape-title { font: 700 17px 'Inter', 'Segoe UI', sans-serif; fill: #222; text-anchor: middle; }
      .shape-sub { font: 600 12px 'Inter', 'Segoe UI', sans-serif; fill: #555; text-anchor: middle; }
      .shape-example { font: 700 13px 'Inter', 'Segoe UI', sans-serif; fill: #c0392b; text-anchor: middle; }
      .cell-label { font: 600 11px sans-serif; fill: #333; text-anchor: middle; }
      .sep { stroke: #d1d5db; stroke-width: 1; fill: none; stroke-dasharray: 4 4; }
    </style>
  </defs>
  <rect width="600" height="320" fill="#ffffff"/>

  <line class="sep" x1="200" y1="30" x2="200" y2="290"/>
  <line class="sep" x1="400" y1="30" x2="400" y2="290"/>

  <!-- Panel 1: Circle / Venn -->
  <g>
    <circle class="circle-a" cx="78"  cy="115" r="50"/>
    <circle class="circle-b" cx="122" cy="115" r="50"/>
    <text class="cell-label" x="55"  y="119">A</text>
    <text class="cell-label" x="145" y="119">B</text>
    <text class="cell-label" x="100" y="119">A∩B</text>
    <text class="shape-title"   x="100" y="215">동그라미</text>
    <text class="shape-sub"     x="100" y="238">관계 · 공통 · 종속</text>
    <text class="shape-example" x="100" y="265">벤다이어그램</text>
  </g>

  <!-- Panel 2: Triangle / Hierarchy -->
  <g>
    <polygon class="triangle-shape" points="300,55 368,175 232,175"/>
    <line class="divider" x1="254" y1="135" x2="346" y2="135"/>
    <line class="divider" x1="277" y1="95"  x2="323" y2="95"/>
    <text class="cell-label" x="300" y="85">Top</text>
    <text class="cell-label" x="300" y="119">Mid</text>
    <text class="cell-label" x="300" y="160">Base</text>
    <text class="shape-title"   x="300" y="215">세모</text>
    <text class="shape-sub"     x="300" y="238">차이(Δ) · 위계</text>
    <text class="shape-example" x="300" y="265">피라미드 · 계층</text>
  </g>

  <!-- Panel 3: Square / 2×2 Matrix -->
  <g>
    <rect class="square-shape" x="445" y="65" width="110" height="110"/>
    <line class="divider" x1="500" y1="65"  x2="500" y2="175"/>
    <line class="divider" x1="445" y1="120" x2="555" y2="120"/>
    <text class="cell-label" x="472" y="95">Q1</text>
    <text class="cell-label" x="528" y="95">Q2</text>
    <text class="cell-label" x="472" y="152">Q3</text>
    <text class="cell-label" x="528" y="152">Q4</text>
    <text class="shape-title"   x="500" y="215">네모</text>
    <text class="shape-sub"     x="500" y="238">분류 · 정량화</text>
    <text class="shape-example" x="500" y="265">2×2 매트릭스 · 수직선</text>
  </g>
</svg>
